name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  checks: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: kvlar

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p kvlar-cli

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }} ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Kvlar ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
          body: |
            ## Installation

            Download the binary for your platform:

            ```bash
            # macOS (Apple Silicon)
            curl -LO https://github.com/kvlar-io/kvlar/releases/download/${{ steps.version.outputs.version }}/kvlar-aarch64-apple-darwin.tar.gz
            tar xzf kvlar-aarch64-apple-darwin.tar.gz
            chmod +x kvlar && sudo mv kvlar /usr/local/bin/kvlar

            # macOS (Intel)
            curl -LO https://github.com/kvlar-io/kvlar/releases/download/${{ steps.version.outputs.version }}/kvlar-x86_64-apple-darwin.tar.gz
            tar xzf kvlar-x86_64-apple-darwin.tar.gz
            chmod +x kvlar && sudo mv kvlar /usr/local/bin/kvlar

            # Linux (x86_64)
            curl -LO https://github.com/kvlar-io/kvlar/releases/download/${{ steps.version.outputs.version }}/kvlar-x86_64-unknown-linux-gnu.tar.gz
            tar xzf kvlar-x86_64-unknown-linux-gnu.tar.gz
            chmod +x kvlar && sudo mv kvlar /usr/local/bin/kvlar
            ```

            Or install via Cargo:
            ```bash
            cargo install kvlar-cli
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
